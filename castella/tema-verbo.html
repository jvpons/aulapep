<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasifica los Verbos - Conjugaciones</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            color: white;
        }
        h1 { text-align: center; margin-bottom: 10px; }
        .info { text-align: center; font-size: 1.2em; margin: 15px; }
        
        .cestas {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .cesta {
            width: 240px;
            text-align: center;
        }
        .cesta .cesta-visual {
            width: 180px;
            height: 180px;
            margin: 0 auto 10px;
            background: #f8fafc;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .cesta h3 { margin: 5px 0; font-size: 1.3em; }
        .cesta .subtitulo { font-size: 1.1em; opacity: 0.9; }

        .dropzone {
            height: 220px;
            border: 4px dashed #e2e8f0;
            border-radius: 20px;
            margin-top: 10px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            background: rgba(255,255,255,0.1);
            min-height: 180px;
            transition: all 0.3s;
        }
        .dropzone.dragover {
            background: rgba(255,255,255,0.25);
            border-color: white;
        }

        .palabra {
            background: white;
            color: #1e2937;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            margin: 4px;
        }
        .palabra:active { transform: scale(0.95); cursor: grabbing; }

        .correcto { 
            background: #4ade80 !important; 
            color: white; 
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
        }

        button {
            display: block;
            margin: 30px auto;
            padding: 14px 32px;
            font-size: 1.1em;
            background: white;
            color: #4f46e5;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🧺 Clasifica los Verbos por Conjugación</h1>
    <div class="info">Arrastra cada verbo a su cesta correspondiente</div>

    <div class="cestas" id="cestas"></div>

    <div class="info" id="puntuacion">Puntuación: <strong>0 / 15</strong></div>
    <button onclick="reiniciarJuego()">🔄 Reiniciar Juego</button>

    <script>
        const verbosOriginales = [
            {texto: "Cantar", categoria: "AR"},
            {texto: "Bailar", categoria: "AR"},
            {texto: "Hablar", categoria: "AR"},
            {texto: "Caminar", categoria: "AR"},
            {texto: "Jugar", categoria: "AR"},
            {texto: "Comer", categoria: "ER"},
            {texto: "Beber", categoria: "ER"},
            {texto: "Correr", categoria: "ER"},
            {texto: "Leer", categoria: "ER"},
            {texto: "Aprender", categoria: "ER"},
            {texto: "Vivir", categoria: "IR"},
            {texto: "Salir", categoria: "IR"},
            {texto: "Dormir", categoria: "IR"},
            {texto: "Escribir", categoria: "IR"},
            {texto: "Decidir", categoria: "IR"}
        ];

        const categorias = [
            {id: "AR", nombre: "Verbos en -AR", grupo: "1ª conjugación"},
            {id: "ER", nombre: "Verbos en -ER", grupo: "2ª conjugación"},
            {id: "IR", nombre: "Verbos en -IR", grupo: "3ª conjugación"}
        ];

        let verbos = [];
        let puntuacion = 0;

        function mezclarArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function crearCestas() {
            const contenedor = document.getElementById('cestas');
            contenedor.innerHTML = '';
            
            categorias.forEach(cat => {
                const cesta = document.createElement('div');
                cesta.className = 'cesta';
                cesta.innerHTML = `
                    <div class="cesta-visual">🧺</div>
                    <h3>${cat.nombre}</h3>
                    <div class="subtitulo">${cat.grupo}</div>
                    <div class="dropzone" data-categoria="${cat.id}"></div>
                `;
                contenedor.appendChild(cesta);
            });

            document.querySelectorAll('.dropzone').forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('dragover');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                zone.addEventListener('drop', manejarDrop);
            });
        }

        function crearPalabras() {
            const contenedor = document.getElementById('cestas');
            // Las palabras iniciales se crean en una zona temporal, pero se moverán al dropear
            verbos.forEach((verbo, index) => {
                const palabra = document.createElement('div');
                palabra.className = 'palabra';
                palabra.draggable = true;
                palabra.textContent = verbo.texto;
                palabra.dataset.categoria = verbo.categoria;
                palabra.dataset.index = index;

                palabra.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text', palabra.dataset.categoria);
                    e.dataTransfer.setData('index', palabra.dataset.index);
                    e.dataTransfer.setData('elemento', 'palabra');
                });

                // Colocarlas inicialmente fuera de las cestas (en la parte superior)
                if (index < 5) {
                    const tempZone = document.createElement('div');
                    tempZone.style.display = 'flex';
                    tempZone.style.justifyContent = 'center';
                    tempZone.style.margin = '10px';
                    tempZone.appendChild(palabra);
                    contenedor.parentNode.insertBefore(tempZone, contenedor);
                } else {
                    // Mejor: crear una zona inicial visible
                }
            });
        }

        // Mejor versión simplificada y funcional
        function iniciarJuego() {
            verbos = mezclarArray([...verbosOriginales]);
            puntuacion = 0;
            document.getElementById('puntuacion').innerHTML = `Puntuación: <strong>0 / 15</strong>`;
            crearCestas();
            crearPalabrasIniciales();
        }

        function crearPalabrasIniciales() {
            const palabrasContainer = document.createElement('div');
            palabrasContainer.style = "display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 30px 0; min-height: 80px;";
            palabrasContainer.id = "palabras-iniciales";

            verbos.forEach((verbo, index) => {
                const palabra = document.createElement('div');
                palabra.className = 'palabra';
                palabra.draggable = true;
                palabra.textContent = verbo.texto;
                palabra.dataset.categoria = verbo.categoria;
                palabra.dataset.index = index;

                palabra.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('categoria', palabra.dataset.categoria);
                    e.dataTransfer.setData('index', palabra.dataset.index);
                    palabra.style.opacity = '0.5';
                });

                palabra.addEventListener('dragend', () => palabra.style.opacity = '1');

                palabrasContainer.appendChild(palabra);
            });

            document.body.insertBefore(palabrasContainer, document.getElementById('cestas'));
        }

        function manejarDrop(e) {
            e.preventDefault();
            const zona = e.currentTarget;
            zona.classList.remove('dragover');

            const categoriaCorrecta = e.dataTransfer.getData('categoria');
            const index = e.dataTransfer.getData('index');
            const categoriaSoltada = zona.dataset.categoria;

            const palabra = document.querySelector(`.palabra[data-index="${index}"]`);

            if (categoriaCorrecta === categoriaSoltada) {
                palabra.classList.add('correcto');
                palabra.draggable = false;
                zona.appendChild(palabra);   // ← Se mueve a la cesta
                puntuacion++;
                document.getElementById('puntuacion').innerHTML = `Puntuación: <strong>${puntuacion} / 15</strong>`;

                if (puntuacion === 15) {
                    setTimeout(() => alert("¡Felicidades! Has completado el juego correctamente 🎉"), 300);
                }
            } else {
                palabra.style.animation = 'shake 0.4s';
                setTimeout(() => palabra.style.animation = '', 500);
            }
        }

        function reiniciarJuego() {
            document.getElementById('palabras-iniciales')?.remove();
            iniciarJuego();
        }

        // Iniciar
        iniciarJuego();
    </script>
</body>
</html>
